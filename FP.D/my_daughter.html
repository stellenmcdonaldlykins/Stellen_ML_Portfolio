<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Novel Demo</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      font-family: Arial, sans-serif;
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game-container {
      width: 900px;
      max-width: 95vw;

      display: flex;
      flex-direction: column;
      align-items: center;

      gap: 20px;
    }

    .image-frame {
      width: 100%;
      height: 500px;

      background-color: #111;
      border: 4px solid white;
      border-radius: 15px;

      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    #scene-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .text-box {
      width: 100%;
      min-height: 180px;

      background: rgba(20, 20, 20, 0.95);

      border: 3px solid white;
      border-radius: 15px;

      padding: 25px;
      box-sizing: border-box;

      font-size: 22px;
      line-height: 1.5;

      cursor: pointer;

      user-select: none;
    }

    #dialogue-text {
      white-space: pre-line;
    }

    .hint {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 15px;
      text-align: right;
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="game-container">

    <!-- IMAGE -->
    <div class="image-frame">
      <img id="scene-image" src="Visual1.png" alt="Scene Image">
    </div>

    <!-- TEXT -->
    <div class="text-box">
      <div id="dialogue-text"></div>
      <div class="hint">Click or press SPACE</div>
    </div>

  </div>

  <script>

    const scenes = [

      {
        image: "Visual1.png",
        text: [
          "She came to me from the walls.",
          "Not from flesh.",
          "Not from man.",
          "But from behind the wallpaper.",
          "I heard her before I saw her.",
          "Soft.",
          "Wet.",
          "A slow thumping through the walls of the house, like blood moving through buried veins.",
          "Something had spread through the house for years by then.",
          "The church women said grief had made me neglect my home.",
          "Maybe they were right.",
          "But grief is holy too.",
          "And loneliness can make even rot feel merciful."
        ]
      },

      {
        image: "Visual2.png",
        text: [
          "The nursery walls had begun to crack like the shell of an egg.",
          "When I peeled back the wallpaper, there she was.",
          "Small limbs curled inside the dark growth.",
          "A face still forming.",
          "Eyes sealed shut beneath translucent skin.",
          "My daughter.",
          "God had returned her to me.",
          "Not as punishment.",
          "As a test."
        ]
      },

      {
        image: "Visual3.png",
        text: [
          "I knew what the others would say.",
          "That something born from rot could not be touched by God.",
          "That no good thing could come from a house like mine.",
          "That grief had driven me toward blasphemy.",
          "They would have torn the walls open.",
          "Burned the nursery.",
          "Burned her with it.",
          "But Abraham was tested too.",
          "Faith demands sacrifice.",
          "Faith demands obedience.",
          "If the Lord placed this child in my hands, then it was my duty to shape her correctly.",
          "To cleanse whatever wrongness lived inside her.",
          "To cut away the darkness clinging to her flesh.",
          "To guide her toward the shape God intended.",
          "To remake her in His image."
        ]
      },

      {
        image: "Visual4.png",
        text: [
          "She learned quickly.",
          "Like a child learning language, she copied me before she understood me.",
          "She folded her misshapen hands when I prayed.",
          "She watched me with those pale, glossy eyes.",
          "She repeated almost every word I spoke.",
          "She wanted so badly to be good.",
          "But she could never hold the shape completely.",
          "Her mouth bent into expressions that lingered too long.",
          "Her voice came from somewhere too deep inside her body, thick and wet like it had to force its way upward.",
          "Sometimes she forgot how many fingers a human hand should have.",
          "Sometimes the extra ones twitched beneath the skin before sinking back into her palm."
        ]
      },

      {
        image: "Visual5.png",
        text: [
          "And so, I corrected her.",
          "Again.",
          "And again.",
          "And again.",
          "I cut away the strange limbs and vague appendages she shaped for herself.",
          "Soft growths twisting from her spine.",
          "Crooked fingers budding beneath her skin.",
          "But each time they returned, they came back sharper.",
          "Harder.",
          "Like thorns forcing their way through flesh.",
          "I scrubbed at her skin until black spores bled into the bathwater like spilled ink.",
          "I pressed her into dresses she could barely keep together, their seams damp with rot by the end of the day.",
          "No matter how tightly I buttoned them, something beneath her skin always pushed outward.",
          "Still she changed.",
          "Not into my daughter.",
          "Into something that resisted me.",
          "Something that refused the shape I gave it."
        ]
      },

      {
        image: "Visual6.png",
        text: [
          "I prayed harder.",
          "I begged the Lord to free her flesh from the darkness that had shaped it.",
          "I anointed her forehead with oil.",
          "I pressed trembling hands against her skin and prayed for deliverance.",
          "I asked God to make her pure again.",
          "I told her no soul was beyond redemption.",
          "That the Lord corrects those He loves.",
          "That suffering was the doorway through which grace entered the body.",
          "I told her rebellion was sin.",
          "That temptation wears many faces.",
          "That the world devours those who abandon God’s design.",
          "I warned her what would happen if she continued like this.",
          "Still she disobeyed.",
          "Still she pulled further away from me every day.",
          "Her body grew stranger.",
          "Less like a child.",
          "Less human every day."
        ]
      },

      {
        image: "Visual7.png",
        text: [
          "And on my last night, I woke to find the house breathing like the day she was born.",
          "The walls pulsed slowly in the dark.",
          "Wet lungs hidden beneath plaster.",
          "She stood at the foot of my bed.",
          "Taller now.",
          "Her body shifted softly beneath the dim light, as though it could no longer decide what shape to hold.",
          "Not my daughter anymore.",
          "Not even pretending to be.",
          "I do not remember who struck first.",
          "Only the screaming.",
          "The thrashing.",
          "The sound of the walls splitting open around us.",
          "The house tore apart like rotten fruit.",
          "Wet soil and spores filled my lungs.",
          "And for the first time, I understood what she was.",
          "Not holy.",
          "Not human.",
          "Just alive.",
          "End"
        ]
      }

    ];

    let currentScene = 0;
    let currentLine = 0;

    let isTyping = false;
    let typingInterval;

    let currentText = "";
    let currentChar = 0;

    const typingSpeed = 28;

    const sceneImage = document.getElementById("scene-image");
    const dialogueText = document.getElementById("dialogue-text");
    const textBox = document.querySelector(".text-box");

    function typeLine() {

      clearInterval(typingInterval);

      sceneImage.src = scenes[currentScene].image;

      sceneImage.classList.remove("fade-in");
      void sceneImage.offsetWidth;
      sceneImage.classList.add("fade-in");

      currentText = scenes[currentScene].text[currentLine];

      currentChar = 0;

      dialogueText.textContent = "";

      isTyping = true;

      typingInterval = setInterval(() => {

        dialogueText.textContent += currentText[currentChar];

        currentChar++;

        if (currentChar >= currentText.length) {

          clearInterval(typingInterval);

          isTyping = false;
        }

      }, typingSpeed);
    }

    function skipTyping() {

      clearInterval(typingInterval);

      dialogueText.textContent = currentText;

      isTyping = false;
    }

    function advanceDialogue() {

      if (isTyping) {

        skipTyping();
        return;
      }

      currentLine++;

      if (currentLine >= scenes[currentScene].text.length) {

        currentScene++;
        currentLine = 0;
      }

      if (currentScene >= scenes.length) {

        dialogueText.textContent = "End";

        return;
      }

      typeLine();
    }

    textBox.addEventListener("click", advanceDialogue);

    document.addEventListener("keydown", function(event) {

      if (event.code === "Space") {

        event.preventDefault();

        advanceDialogue();
      }

    });

    typeLine();

  </script>

</body>
</html>
