<script>
function applyContrastSetting() {
    const savedContrast = localStorage.getItem("highContrast");
    const btn = document.querySelector(".btn-outline-light");

    if (savedContrast === "on") {
        document.body.classList.add("high-contrast");
        btn.innerText = "Normal Mode";
    } else {
        document.body.classList.remove("high-contrast");
        btn.innerText = "High Contrast";
    }
}

function toggleContrast() {
    const isHighContrast = document.body.classList.toggle("high-contrast");
    const btn = document.querySelector(".btn-outline-light");

    if (isHighContrast) {
        localStorage.setItem("highContrast", "on");
        btn.innerText = "Normal Mode";
    } else {
        localStorage.setItem("highContrast", "off");
        btn.innerText = "High Contrast";
    }
}

applyContrastSetting();
</script>
